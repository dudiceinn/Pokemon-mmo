<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map Editor — Collision, Warps & NPCs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    #toolbar {
      padding: 8px 16px; background: #16213e; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    #toolbar select, #toolbar button, #toolbar input[type=number] {
      font-family: monospace; font-size: 14px; padding: 4px 8px; background: #0f3460; color: #eee;
      border: 1px solid #555; cursor: pointer;
    }
    #toolbar input[type=number] { width: 50px; }
    #toolbar button:hover { background: #1a5276; }
    .mode { display: flex; gap: 4px; }
    .mode button.active-collision { background: #e94560; border-color: #e94560; }
    .mode button.active-warp { background: #4560e9; border-color: #4560e9; }
    .mode button.active-erase { background: #45e960; border-color: #45e960; color: #000; }
    .mode button.active-npc { background: #e9c845; border-color: #e9c845; color: #000; }
    #toolbar label { font-size: 13px; }
    #coords { font-size: 14px; color: #ffd700; min-width: 80px; }
    #info { font-size: 12px; color: #aaa; flex-basis: 100%; }
    #viewport { flex: 1; overflow: auto; position: relative; cursor: crosshair; }
    canvas { image-rendering: pixelated; display: block; }

    /* Warp panel */
    #warpPanel {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #16213e; border: 2px solid #4560e9; padding: 16px; z-index: 100;
      min-width: 320px;
    }
    #warpPanel h3 { margin-bottom: 8px; color: #4560e9; }
    #warpPanel label { display: block; margin: 6px 0 2px; font-size: 13px; }
    #warpPanel select, #warpPanel input {
      font-family: monospace; font-size: 14px; padding: 4px 8px; background: #0f3460;
      color: #eee; border: 1px solid #555; width: 100%;
    }
    #warpPanel .btns { margin-top: 12px; display: flex; gap: 8px; }
    #warpPanel .btns button { flex: 1; padding: 6px; font-size: 14px; }
    #warpPanel .btn-save { background: #4560e9; border-color: #4560e9; }
    #warpPanel .btn-delete { background: #e94560; border-color: #e94560; }
    #warpPanel .btn-cancel { background: #555; border-color: #555; }

    /* NPC panel — full screen two-column layout */
    #npcPanel {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #16213e; border: none; padding: 0; z-index: 100;
      flex-direction: column;
    }
    #npcPanel.visible { display: flex; }
    #npcPanel .panel-header {
      padding: 10px 20px; border-bottom: 2px solid #e9c845; display: flex;
      justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    #npcPanel .panel-header h3 { margin: 0; color: #e9c845; }
    #npcPanel .panel-body {
      display: flex; flex: 1; overflow: hidden;
    }
    #npcPanel .panel-left {
      width: 340px; min-width: 300px; padding: 12px 20px; overflow-y: auto;
      border-right: 1px solid #444; flex-shrink: 0;
    }
    #npcPanel .panel-right {
      flex: 1; padding: 12px 20px; overflow-y: auto; display: flex; flex-direction: column;
    }
    #npcPanel .panel-footer {
      padding: 10px 20px; border-top: 1px solid #444; flex-shrink: 0;
    }
    #npcPanel label { display: block; margin: 5px 0 2px; font-size: 13px; }
    #npcPanel select, #npcPanel input, #npcPanel textarea {
      font-family: monospace; font-size: 14px; padding: 4px 8px; background: #0f3460;
      color: #eee; border: 1px solid #555; width: 100%;
    }
    #npcPanel textarea { height: 80px; resize: vertical; }
    .dialog-entry {
      border: 1px solid #555; padding: 8px; margin-bottom: 8px; background: #0a1a30; position: relative;
    }
    .dialog-entry label { margin: 4px 0 2px; }
    .dialog-entry .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .dialog-entry .entry-header span { font-size: 12px; color: #e9c845; }
    .dialog-entry .entry-actions button {
      font-family: monospace; font-size: 12px; padding: 2px 6px; background: #333; color: #eee;
      border: 1px solid #555; cursor: pointer; margin-left: 4px;
    }
    .dialog-entry .entry-actions button:hover { background: #555; }
    .dialog-entry input, .dialog-entry textarea { margin-bottom: 4px; }
    #dialogList { flex: 1; overflow-y: auto; margin-bottom: 8px; }
    #btnAddDialog {
      font-family: monospace; font-size: 13px; padding: 4px 12px; background: #1a5276;
      color: #eee; border: 1px solid #555; cursor: pointer; width: 100%; margin-bottom: 0;
      flex-shrink: 0;
    }
    #btnAddDialog:hover { background: #2a6286; }
    #npcPanel .btns { display: flex; gap: 8px; }
    #npcPanel .btns button { flex: 1; padding: 6px; font-size: 14px; }
    #npcPanel .btn-save { background: #e9c845; border-color: #e9c845; color: #000; }
    #npcPanel .btn-delete { background: #e94560; border-color: #e94560; }
    #npcPanel .btn-cancel { background: #555; border-color: #555; }

    /* Flag debug panel */
    #flagPanel {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #16213e; border: 2px solid #45e960; padding: 20px; z-index: 100;
      width: 700px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
    }
    #flagPanel h3 { margin-bottom: 12px; color: #45e960; }
    #flagPanel .flag-group {
      border: 1px solid #444; margin-bottom: 10px; background: #0a1a30;
    }
    #flagPanel .flag-group-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: #0f2440; cursor: pointer;
    }
    #flagPanel .flag-group-header span { color: #45e960; font-size: 13px; font-weight: bold; }
    #flagPanel .flag-group-header button {
      font-family: monospace; font-size: 11px; padding: 2px 8px; background: #e94560;
      color: #fff; border: 1px solid #e94560; cursor: pointer;
    }
    #flagPanel .flag-group-header button:hover { background: #c73a52; }
    #flagPanel .flag-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 10px 4px 20px; border-top: 1px solid #333;
    }
    #flagPanel .flag-item span { font-size: 13px; color: #ccc; }
    #flagPanel .flag-item button {
      font-family: monospace; font-size: 11px; padding: 1px 6px; background: #555;
      color: #eee; border: 1px solid #666; cursor: pointer;
    }
    #flagPanel .flag-item button:hover { background: #777; }
    #flagPanel .flag-actions {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    #flagPanel .flag-actions button {
      font-family: monospace; font-size: 13px; padding: 4px 12px; cursor: pointer;
      border: 1px solid #555;
    }
    #flagPanel .flag-empty { color: #888; font-style: italic; padding: 20px; text-align: center; }
    #flagPanel .flag-add { display: flex; gap: 8px; margin-bottom: 12px; }
    #flagPanel .flag-add input {
      font-family: monospace; font-size: 13px; padding: 4px 8px; background: #0f3460;
      color: #eee; border: 1px solid #555; flex: 1;
    }
    #flagPanel .flag-add button {
      font-family: monospace; font-size: 13px; padding: 4px 12px; background: #45e960;
      color: #000; border: 1px solid #45e960; cursor: pointer;
    }

    #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    #legend { font-size: 11px; color: #888; }
    #legend span { padding: 1px 6px; margin-right: 4px; }
    .leg-coll { background: rgba(255,0,0,0.5); }
    .leg-warp { background: rgba(69,96,233,0.7); }
    .leg-npc { background: rgba(233,200,69,0.7); }
    .leg-sign { background: rgba(69,233,96,0.7); }
    .leg-trigger { background: rgba(180,69,233,0.7); }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>Map: <select id="mapSelect"></select></label>
    <span id="coords">(-, -)</span>
    <div class="mode">
      <button id="btnCollision" class="active-collision" onclick="setMode('collision')">Collision</button>
      <button id="btnWarp" onclick="setMode('warp')">Warp</button>
      <button id="btnNpc" onclick="setMode('npc')">NPC</button>
      <button id="btnErase" onclick="setMode('erase')">Erase</button>
    </div>
    <button onclick="saveAll()">Save All</button>
    <button onclick="loadMap()">Reload</button>
    <button onclick="openFlagPanel()" style="background:#45e960;color:#000;border-color:#45e960;">Flags Debug</button>
    <label><input type="checkbox" id="showGrid" checked onchange="render()"> Grid</label>
    <label>Opacity: <input type="range" id="opacity" min="10" max="90" value="50" oninput="render()"></label>
    <div id="legend">
      <span class="leg-coll">Red = Collision</span>
      <span class="leg-warp">Blue = Warp</span>
      <span class="leg-npc">Yellow = NPC</span>
      <span class="leg-sign">Green = Sign</span>
      <span class="leg-trigger">Purple = Trigger</span>
    </div>
    <span id="info">Collision mode: click/drag to paint blocked tiles.</span>
  </div>
  <div id="viewport">
    <canvas id="canvas"></canvas>
  </div>

  <div id="overlay" onclick="closeAllPanels()"></div>

  <!-- Warp panel -->
  <div id="warpPanel">
    <h3>Edit Warp at (<span id="wpX"></span>, <span id="wpY"></span>)</h3>
    <label>Destination Map</label>
    <select id="wpDestMap"></select>
    <label>Dest X</label>
    <input type="number" id="wpDestX" min="0" value="0">
    <label>Dest Y</label>
    <input type="number" id="wpDestY" min="0" value="0">
    <div class="btns">
      <button class="btn-save" onclick="saveWarp()">Save</button>
      <button class="btn-delete" onclick="deleteWarp()">Delete</button>
      <button class="btn-cancel" onclick="closeAllPanels()">Cancel</button>
    </div>
  </div>

  <!-- NPC panel — fullscreen two-column -->
  <div id="npcPanel">
    <div class="panel-header">
      <h3>Edit NPC at (<span id="npX"></span>, <span id="npY"></span>)</h3>
      <div class="btns" style="gap:6px;">
        <button class="btn-save" onclick="saveNpc()">Save</button>
        <button class="btn-duplicate" onclick="duplicateNpc()" style="background:#1a5276;border-color:#1a5276;">Duplicate</button>
        <button class="btn-delete" onclick="deleteNpc()">Delete</button>
        <button class="btn-cancel" onclick="closeAllPanels()">Cancel</button>
      </div>
    </div>
    <div class="panel-body">
      <!-- Left column: NPC properties -->
      <div class="panel-left">
        <label>Name</label>
        <input type="text" id="npName" placeholder="Prof. Oak">
        <label>Type</label>
        <select id="npType">
          <option value="npc">NPC (visible, blocks)</option>
          <option value="sign">Sign (invisible, interact)</option>
          <option value="trigger">Trigger (invisible, step-on)</option>
        </select>
        <label>Sprite</label>
        <select id="npSprite"></select>
        <label>Direction</label>
        <select id="npDir">
          <option value="down">Down</option>
          <option value="up">Up</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
        <hr style="border-color:#444; margin:10px 0;">
        <label>Show Flag <span style="color:#888; font-size:11px;">(appears when set)</span></label>
        <input type="text" id="npShowFlag" placeholder="e.g. oak_at_lab">
        <label>Hide Flag <span style="color:#888; font-size:11px;">(disappears when set)</span></label>
        <input type="text" id="npHideFlag" placeholder="e.g. oak_left">
        <hr style="border-color:#444; margin:10px 0;">
        <label>Walk On Flag <span style="color:#888; font-size:11px;">(NPC walks when set)</span></label>
        <input type="text" id="npWalkOnFlag" placeholder="e.g. oak_should_walk">
        <label>Walk To (X, Y)</label>
        <div style="display:flex;gap:8px;">
          <input type="number" id="npWalkToX" min="0" style="width:50%;" placeholder="X">
          <input type="number" id="npWalkToY" min="0" style="width:50%;" placeholder="Y">
        </div>
        <hr style="border-color:#444; margin:10px 0;">
        <label>
          <input type="checkbox" id="npAutoTalk"> Auto Talk (starts dialog when NPC appears)
        </label>
        <label>
          <input type="checkbox" id="npRoam"> Roam (random movement)
        </label>
        <label>Roam Radius</label>
        <input type="number" id="npRoamRadius" min="1" max="20" value="3" style="width:80px;">
      </div>
      <!-- Right column: Dialogs -->
      <div class="panel-right">
        <label style="font-size:14px; color:#e9c845; margin-bottom:6px;">Dialogs (conditional)</label>
        <div id="dialogList"></div>
        <button id="btnAddDialog" onclick="addDialogEntry()">+ Add Dialog Entry</button>
      </div>
    </div>
  </div>

  <!-- Flag debug panel -->
  <div id="flagPanel">
    <h3>Game Flags Debug</h3>
    <div class="flag-add">
      <input type="text" id="flagAddInput" placeholder="Flag name to set (e.g. quest1_complete)">
      <button onclick="addFlag()">Set Flag</button>
    </div>
    <div class="flag-actions">
      <button onclick="clearAllFlags()" style="background:#e94560;color:#fff;border-color:#e94560;">Clear ALL Flags</button>
      <button onclick="closeFlagPanel()" style="background:#555;color:#eee;border-color:#555;">Close</button>
    </div>
    <div id="flagContent"></div>
  </div>

  <script>
    const TILE = 16;
    const SCALE = 2;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const mapSelect = document.getElementById('mapSelect');

    let currentMap = null;
    let mapKey = '';
    let tilesetImg = null;
    let collisionData = [];
    let warps = [];
    let npcs = [];
    let mapW = 0, mapH = 0;
    let mode = 'collision';
    let painting = false;
    let editingWarpIdx = -1;
    let editingNpcIdx = -1;
    let draggingNpcIdx = -1;

    // NPC sprite keys — keep in sync with BootScene.js NPC_SPRITES
    const NPC_SPRITES = [
      'npc_agatha', 'npc_balding_man', 'npc_battle_girl', 'npc_beauty', 'npc_biker',
      'npc_bill', 'npc_blackbelt', 'npc_blaine', 'npc_blue', 'npc_boy',
      'npc_brock', 'npc_bruno', 'npc_bug_catcher', 'npc_cable_club_receptionist',
      'npc_cameraman', 'npc_camper', 'npc_captain', 'npc_celio', 'npc_channeler',
      'npc_chef', 'npc_clerk', 'npc_cooltrainer_f', 'npc_cooltrainer_m', 'npc_daisy',
      'npc_erika', 'npc_fat_man', 'npc_fisher', 'npc_gba_kid', 'npc_gentleman',
      'npc_giovanni', 'npc_gym_guy', 'npc_hiker', 'npc_koga', 'npc_lance',
      'npc_lass', 'npc_little_boy', 'npc_little_girl', 'npc_lorelei', 'npc_lt_surge',
      'npc_man', 'npc_mg_deliveryman', 'npc_misty', 'npc_mom', 'npc_mr_fuji',
      'npc_nurse', 'npc_oak', 'npc_old_man_1', 'npc_old_man_2', 'npc_old_man_lying_down',
      'npc_old_woman', 'npc_picnicker', 'npc_policeman', 'npc_rich_boy', 'npc_rocker',
      'npc_rocket_f', 'npc_rocket_m', 'npc_rs_brendan', 'npc_rs_may', 'npc_sabrina',
      'npc_sailor', 'npc_scientist', 'npc_sitting_boy', 'npc_super_nerd',
      'npc_swimmer_f_land', 'npc_swimmer_f_water', 'npc_swimmer_m_land', 'npc_swimmer_m_water',
      'npc_teachy_tv_host', 'npc_trainer_tower_dude', 'npc_tuber_f', 'npc_tuber_m_land',
      'npc_tuber_m_water', 'npc_union_room_receptionist', 'npc_unused_male_receptionist',
      'npc_unused_man', 'npc_unused_woman', 'npc_woman', 'npc_woman_1', 'npc_woman_2',
      'npc_woman_3', 'npc_worker_f', 'npc_worker_m', 'npc_youngster',
    ];

    // Populate sprite dropdown
    const npSpriteSelect = document.getElementById('npSprite');
    NPC_SPRITES.forEach(k => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = k;
      npSpriteSelect.appendChild(opt);
    });

    const MAPS = [
      'pallet_town', 'route1',
      'players_house_1f', 'players_house_2f',
      'rivals_house', 'oaks_lab',
    ];

    // Hardcoded warps from shared/maps.js — loaded as defaults if no _warps in JSON
    const HARDCODED_WARPS = {
      pallet_town: [
        { x: 6, y: 7, destMap: 'players_house_1f', destX: 4, destY: 7 },
        { x: 15, y: 7, destMap: 'rivals_house', destX: 4, destY: 7 },
        { x: 16, y: 13, destMap: 'oaks_lab', destX: 6, destY: 12 },
      ],
      route1: [],
      players_house_1f: [
        { x: 5, y: 8, destMap: 'pallet_town', destX: 6, destY: 8 },
        { x: 4, y: 8, destMap: 'pallet_town', destX: 6, destY: 8 },
        { x: 10, y: 2, destMap: 'players_house_2f', destX: 1, destY: 2 },
        { x: 3, y: 9, destMap: 'pallet_town', destX: 6, destY: 8 },
      ],
      players_house_2f: [
        { x: 10, y: 2, destMap: 'players_house_1f', destX: 10, destY: 3 },
      ],
      rivals_house: [
        { x: 4, y: 8, destMap: 'pallet_town', destX: 15, destY: 8 },
        { x: 5, y: 8, destMap: 'pallet_town', destX: 15, destY: 8 },
        { x: 3, y: 9, destMap: 'pallet_town', destX: 15, destY: 8 },
      ],
      oaks_lab: [
        { x: 7, y: 13, destMap: 'pallet_town', destX: 16, destY: 14 },
        { x: 6, y: 13, destMap: 'pallet_town', destX: 16, destY: 14 },
      ],
    };

    // Populate map dropdown
    MAPS.forEach(k => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = k;
      mapSelect.appendChild(opt);
    });
    mapSelect.addEventListener('change', () => loadMap());

    function populateWarpDestSelect(defaultMap) {
      const sel = document.getElementById('wpDestMap');
      sel.innerHTML = '';
      MAPS.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k; opt.textContent = k;
        sel.appendChild(opt);
      });
      sel.value = defaultMap || mapKey;
    }

    function setMode(m) {
      mode = m;
      document.getElementById('btnCollision').className = m === 'collision' ? 'active-collision' : '';
      document.getElementById('btnWarp').className = m === 'warp' ? 'active-warp' : '';
      document.getElementById('btnNpc').className = m === 'npc' ? 'active-npc' : '';
      document.getElementById('btnErase').className = m === 'erase' ? 'active-erase' : '';
      const msgs = {
        collision: 'Collision mode: click/drag to paint blocked tiles.',
        warp: 'Warp mode: click a tile to place or edit a warp. Blue tiles = existing warps.',
        npc: 'NPC mode: click to place/edit NPC. Drag existing NPC to move. Yellow tiles = NPCs.',
        erase: 'Erase mode: click/drag to remove collision, warps, and NPCs.',
      };
      document.getElementById('info').textContent = msgs[m];
    }

    async function loadMap() {
      mapKey = mapSelect.value;
      const resp = await fetch(`/maps/${mapKey}.json`);
      currentMap = await resp.json();
      mapW = currentMap.width;
      mapH = currentMap.height;

      // Collision
      const collLayer = currentMap.layers.find(l => l.name === 'collision');
      collisionData = [...collLayer.data];

      // Warps — prefer _warps from JSON (editor-saved), fallback to hardcoded
      if (currentMap._warps && currentMap._warps.length > 0) {
        warps = currentMap._warps.map(w => ({ ...w }));
      } else if (HARDCODED_WARPS[mapKey]) {
        warps = HARDCODED_WARPS[mapKey].map(w => ({ ...w }));
      } else {
        warps = [];
      }

      // NPCs — from separate npcs/<map>.json file, fallback to _npcs in map JSON
      let npcSource = [];
      try {
        const npcResp = await fetch(`/npcs/${mapKey}.json`);
        if (npcResp.ok) {
          npcSource = await npcResp.json();
        }
      } catch (e) {}
      if (!npcSource.length && currentMap._npcs && currentMap._npcs.length > 0) {
        npcSource = currentMap._npcs;
      }
      npcs = npcSource.map(n => ({
        ...n,
        dialog: [...(n.dialog || [])],
        dialogs: (n.dialogs || []).map(d => ({
          condition: d.condition || '', setFlag: d.setFlag || '', clearFlag: d.clearFlag || '',
          lines: [...(d.lines || [])],
          walkTo: d.walkTo ? { ...d.walkTo } : null,
        })),
      }));

      tilesetImg = new Image();
      tilesetImg.onload = () => {
        canvas.width = mapW * TILE * SCALE;
        canvas.height = mapH * TILE * SCALE;
        render();
      };
      tilesetImg.src = `/tilesets/${mapKey}_tileset.png`;

      document.getElementById('info').textContent =
        `Loaded ${mapKey} (${mapW}x${mapH}) — ${warps.length} warps, ${npcs.length} NPCs`;
    }

    function render() {
      if (!tilesetImg || !currentMap) return;
      ctx.imageSmoothingEnabled = false;

      const groundLayer = currentMap.layers.find(l => l.name === 'ground');
      const tsCols = currentMap.tilesets[0].columns;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < mapH; y++) {
        for (let x = 0; x < mapW; x++) {
          const tileId = groundLayer.data[y * mapW + x] - 1;
          if (tileId < 0) continue;
          const srcX = (tileId % tsCols) * TILE;
          const srcY = Math.floor(tileId / tsCols) * TILE;
          ctx.drawImage(tilesetImg, srcX, srcY, TILE, TILE,
            x * TILE * SCALE, y * TILE * SCALE, TILE * SCALE, TILE * SCALE);
        }
      }

      const opacity = document.getElementById('opacity').value / 100;

      // Collision overlay
      for (let y = 0; y < mapH; y++) {
        for (let x = 0; x < mapW; x++) {
          if (collisionData[y * mapW + x] > 0) {
            ctx.fillStyle = `rgba(255, 0, 0, ${opacity})`;
            ctx.fillRect(x * TILE * SCALE, y * TILE * SCALE, TILE * SCALE, TILE * SCALE);
          }
        }
      }

      // Warp overlay
      for (const w of warps) {
        ctx.fillStyle = `rgba(69, 96, 233, 0.7)`;
        ctx.fillRect(w.x * TILE * SCALE, w.y * TILE * SCALE, TILE * SCALE, TILE * SCALE);
        ctx.fillStyle = '#fff';
        ctx.font = `${10 * SCALE}px monospace`;
        ctx.fillText(w.destMap.substring(0, 8), w.x * TILE * SCALE + 2, w.y * TILE * SCALE + 11 * SCALE);
        ctx.font = `${7 * SCALE}px monospace`;
        ctx.fillText(`(${w.destX},${w.destY})`, w.x * TILE * SCALE + 2, w.y * TILE * SCALE + 15 * SCALE);
      }

      // NPC overlay (color-coded by type)
      for (const n of npcs) {
        const npcType = n.type || 'npc';
        if (npcType === 'sign') {
          ctx.fillStyle = `rgba(69, 233, 96, 0.7)`;
        } else if (npcType === 'trigger') {
          ctx.fillStyle = `rgba(180, 69, 233, 0.7)`;
        } else {
          ctx.fillStyle = `rgba(233, 200, 69, 0.7)`;
        }
        ctx.fillRect(n.x * TILE * SCALE, n.y * TILE * SCALE, TILE * SCALE, TILE * SCALE);
        ctx.fillStyle = '#000';
        ctx.font = `${9 * SCALE}px monospace`;
        const typeLabel = npcType !== 'npc' ? `[${npcType}]` : '';
        const label = (n.name || n.sprite || 'NPC').substring(0, 10);
        ctx.fillText(typeLabel || label, n.x * TILE * SCALE + 2, n.y * TILE * SCALE + 10 * SCALE);
        ctx.font = `${7 * SCALE}px monospace`;
        const dCount = n.dialogs && n.dialogs.length > 0 ? n.dialogs.length + 'D' : (n.dialog ? n.dialog.length + 'L' : '0L');
        ctx.fillText(`${n.dir || 'down'} ${dCount}`, n.x * TILE * SCALE + 2, n.y * TILE * SCALE + 14 * SCALE);
      }

      // Grid
      if (document.getElementById('showGrid').checked) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 1;
        for (let x = 0; x <= mapW; x++) {
          ctx.beginPath();
          ctx.moveTo(x * TILE * SCALE, 0);
          ctx.lineTo(x * TILE * SCALE, mapH * TILE * SCALE);
          ctx.stroke();
        }
        for (let y = 0; y <= mapH; y++) {
          ctx.beginPath();
          ctx.moveTo(0, y * TILE * SCALE);
          ctx.lineTo(mapW * TILE * SCALE, y * TILE * SCALE);
          ctx.stroke();
        }
      }
    }

    function getTile(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / (TILE * SCALE));
      const y = Math.floor((e.clientY - rect.top) / (TILE * SCALE));
      if (x < 0 || y < 0 || x >= mapW || y >= mapH) return null;
      return { x, y };
    }

    function findWarpAt(x, y) {
      return warps.findIndex(w => w.x === x && w.y === y);
    }

    function findNpcAt(x, y) {
      return npcs.findIndex(n => n.x === x && n.y === y);
    }

    // Always show coordinates on mouse move
    canvas.addEventListener('mousemove', (e) => {
      const t = getTile(e);
      if (t) {
        const wi = findWarpAt(t.x, t.y);
        const ni = findNpcAt(t.x, t.y);
        const coll = collisionData[t.y * mapW + t.x] > 0;
        let label = `(${t.x}, ${t.y})`;
        if (coll) label += ' [blocked]';
        if (wi >= 0) label += ` [warp→${warps[wi].destMap}]`;
        if (ni >= 0) label += ` [NPC: ${npcs[ni].name || npcs[ni].sprite}]`;
        document.getElementById('coords').textContent = label;
      } else {
        document.getElementById('coords').textContent = '(-, -)';
      }

      // Drag NPC
      if (draggingNpcIdx >= 0 && t) {
        npcs[draggingNpcIdx].x = t.x;
        npcs[draggingNpcIdx].y = t.y;
        render();
        return;
      }

      if (painting && (mode === 'collision' || mode === 'erase')) handlePaint(e);
    });

    function handlePaint(e) {
      const t = getTile(e);
      if (!t) return;

      if (mode === 'collision') {
        collisionData[t.y * mapW + t.x] = 1;
        render();
      } else if (mode === 'erase') {
        collisionData[t.y * mapW + t.x] = 0;
        const wi = findWarpAt(t.x, t.y);
        if (wi >= 0) warps.splice(wi, 1);
        const ni = findNpcAt(t.x, t.y);
        if (ni >= 0) npcs.splice(ni, 1);
        render();
      }
    }

    function handleClick(e) {
      const t = getTile(e);
      if (!t) return;

      if (mode === 'collision') {
        collisionData[t.y * mapW + t.x] = 1;
        render();
      } else if (mode === 'erase') {
        collisionData[t.y * mapW + t.x] = 0;
        const wi = findWarpAt(t.x, t.y);
        if (wi >= 0) warps.splice(wi, 1);
        const ni = findNpcAt(t.x, t.y);
        if (ni >= 0) npcs.splice(ni, 1);
        render();
      } else if (mode === 'warp') {
        const wi = findWarpAt(t.x, t.y);
        if (wi >= 0) {
          openWarpPanel(wi);
        } else {
          warps.push({ x: t.x, y: t.y, destMap: mapKey, destX: 0, destY: 0 });
          openWarpPanel(warps.length - 1);
        }
        render();
      } else if (mode === 'npc') {
        const ni = findNpcAt(t.x, t.y);
        if (ni >= 0) {
          // Start drag — panel opens on mouseup if not dragged far
          draggingNpcIdx = ni;
          draggingNpcStartX = npcs[ni].x;
          draggingNpcStartY = npcs[ni].y;
        } else {
          // New NPC
          npcs.push({ x: t.x, y: t.y, name: '', sprite: 'npc_oak', dir: 'down', type: 'npc', showFlag: '', hideFlag: '', walkOnFlag: '', walkTo: null, autoTalk: false, roam: false, roamRadius: 3, dialog: [], dialogs: [] });
          openNpcPanel(npcs.length - 1);
        }
        render();
      }
    }

    let draggingNpcStartX = -1;
    let draggingNpcStartY = -1;

    canvas.addEventListener('mousedown', (e) => {
      painting = true;
      handleClick(e);
    });
    canvas.addEventListener('mouseup', (e) => {
      painting = false;
      if (draggingNpcIdx >= 0) {
        const n = npcs[draggingNpcIdx];
        const didDrag = (n.x !== draggingNpcStartX || n.y !== draggingNpcStartY);
        if (!didDrag) {
          // Clicked without dragging — open edit panel
          openNpcPanel(draggingNpcIdx);
        } else {
          document.getElementById('info').textContent =
            `Moved NPC "${n.name || n.sprite}" to (${n.x}, ${n.y})`;
        }
        draggingNpcIdx = -1;
        render();
      }
    });
    canvas.addEventListener('mouseleave', () => {
      painting = false;
      draggingNpcIdx = -1;
    });

    // --- Warp panel ---

    function openWarpPanel(idx) {
      editingWarpIdx = idx;
      const w = warps[idx];
      document.getElementById('wpX').textContent = w.x;
      document.getElementById('wpY').textContent = w.y;
      populateWarpDestSelect(w.destMap);
      document.getElementById('wpDestX').value = w.destX;
      document.getElementById('wpDestY').value = w.destY;
      document.getElementById('warpPanel').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }

    function closeAllPanels() {
      document.getElementById('warpPanel').style.display = 'none';
      document.getElementById('npcPanel').classList.remove('visible');
      document.getElementById('flagPanel').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
      editingWarpIdx = -1;
      editingNpcIdx = -1;
      render();
    }

    function saveWarp() {
      if (editingWarpIdx < 0) return;
      warps[editingWarpIdx].destMap = document.getElementById('wpDestMap').value;
      warps[editingWarpIdx].destX = parseInt(document.getElementById('wpDestX').value) || 0;
      warps[editingWarpIdx].destY = parseInt(document.getElementById('wpDestY').value) || 0;
      document.getElementById('info').textContent =
        `Warp at (${warps[editingWarpIdx].x}, ${warps[editingWarpIdx].y}) → ${warps[editingWarpIdx].destMap} (${warps[editingWarpIdx].destX}, ${warps[editingWarpIdx].destY})`;
      closeAllPanels();
    }

    function deleteWarp() {
      if (editingWarpIdx < 0) return;
      const w = warps[editingWarpIdx];
      warps.splice(editingWarpIdx, 1);
      document.getElementById('info').textContent = `Warp deleted at (${w.x}, ${w.y})`;
      closeAllPanels();
    }

    // --- NPC panel ---

    let editDialogEntries = [];

    function openNpcPanel(idx) {
      editingNpcIdx = idx;
      const n = npcs[idx];
      document.getElementById('npX').textContent = n.x;
      document.getElementById('npY').textContent = n.y;
      document.getElementById('npName').value = n.name || '';
      document.getElementById('npType').value = n.type || 'npc';
      document.getElementById('npSprite').value = n.sprite || 'npc_oak';
      document.getElementById('npDir').value = n.dir || 'down';
      document.getElementById('npShowFlag').value = n.showFlag || '';
      document.getElementById('npHideFlag').value = n.hideFlag || '';
      document.getElementById('npWalkOnFlag').value = n.walkOnFlag || '';
      document.getElementById('npWalkToX').value = n.walkTo ? n.walkTo.x : '';
      document.getElementById('npWalkToY').value = n.walkTo ? n.walkTo.y : '';
      document.getElementById('npAutoTalk').checked = !!n.autoTalk;
      document.getElementById('npRoam').checked = !!n.roam;
      document.getElementById('npRoamRadius').value = n.roamRadius || 3;

      // Build dialog entries from dialogs array, or fallback from legacy dialog
      if (n.dialogs && n.dialogs.length > 0) {
        editDialogEntries = n.dialogs.map(d => ({
          condition: d.condition || '',
          setFlag: d.setFlag || '',
          clearFlag: d.clearFlag || '',
          lines: (d.lines || []).join('\n'),
          walkToX: d.walkTo ? d.walkTo.x : '',
          walkToY: d.walkTo ? d.walkTo.y : '',
          teleportPlayerX: d.teleportPlayer ? d.teleportPlayer.x : '',
          teleportPlayerY: d.teleportPlayer ? d.teleportPlayer.y : '',
          movePlayerX: d.movePlayer ? d.movePlayer.x : '',
          movePlayerY: d.movePlayer ? d.movePlayer.y : '',
        }));
      } else if (n.dialog && n.dialog.length > 0) {
        editDialogEntries = [{ condition: '', setFlag: '', clearFlag: '', lines: n.dialog.join('\n'), walkToX: '', walkToY: '', teleportPlayerX: '', teleportPlayerY: '', movePlayerX: '', movePlayerY: '' }];
      } else {
        editDialogEntries = [];
      }
      renderDialogList();

      document.getElementById('npcPanel').classList.add('visible');
      document.getElementById('overlay').style.display = 'block';
    }

    function renderDialogList() {
      const container = document.getElementById('dialogList');
      container.innerHTML = '';
      editDialogEntries.forEach((entry, i) => {
        const div = document.createElement('div');
        div.className = 'dialog-entry';
        div.innerHTML = `
          <div class="entry-header">
            <span>#${i + 1}</span>
            <div class="entry-actions">
              ${i > 0 ? `<button onclick="moveDialogEntry(${i}, -1)" title="Move up">&#9650;</button>` : ''}
              ${i < editDialogEntries.length - 1 ? `<button onclick="moveDialogEntry(${i}, 1)" title="Move down">&#9660;</button>` : ''}
              <button onclick="removeDialogEntry(${i})" title="Delete" style="color:#e94560;">&#10005;</button>
            </div>
          </div>
          <label>Condition (flag name, empty = default)</label>
          <input type="text" data-field="condition" data-idx="${i}" value="${entry.condition}" placeholder="e.g. talked_to_oak">
          <label>Set Flag (after reading, empty = none)</label>
          <input type="text" data-field="setFlag" data-idx="${i}" value="${entry.setFlag}" placeholder="e.g. got_pokedex">
          <label>Clear Flag (remove flag after reading, empty = none)</label>
          <input type="text" data-field="clearFlag" data-idx="${i}" value="${entry.clearFlag}" placeholder="e.g. accepted_quest">
          <label>NPC Walk To after dialog (X, Y — empty = no walk)</label>
          <div style="display:flex;gap:8px;">
            <input type="number" data-field="walkToX" data-idx="${i}" value="${entry.walkToX}" placeholder="X" style="width:50%;">
            <input type="number" data-field="walkToY" data-idx="${i}" value="${entry.walkToY}" placeholder="Y" style="width:50%;">
          </div>
          <label>Teleport Player to (X, Y — instant, empty = none)</label>
          <div style="display:flex;gap:8px;">
            <input type="number" data-field="teleportPlayerX" data-idx="${i}" value="${entry.teleportPlayerX}" placeholder="X" style="width:50%;">
            <input type="number" data-field="teleportPlayerY" data-idx="${i}" value="${entry.teleportPlayerY}" placeholder="Y" style="width:50%;">
          </div>
          <label>Move Player to (X, Y — auto-walk, empty = none)</label>
          <div style="display:flex;gap:8px;">
            <input type="number" data-field="movePlayerX" data-idx="${i}" value="${entry.movePlayerX}" placeholder="X" style="width:50%;">
            <input type="number" data-field="movePlayerY" data-idx="${i}" value="${entry.movePlayerY}" placeholder="Y" style="width:50%;">
          </div>
          <label>Lines (one per row)</label>
          <textarea data-field="lines" data-idx="${i}" placeholder="Hello there!&#10;Welcome!">${entry.lines}</textarea>
        `;
        container.appendChild(div);
      });

      // Sync inputs on change
      container.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', () => {
          const idx = parseInt(el.dataset.idx);
          const field = el.dataset.field;
          editDialogEntries[idx][field] = el.value;
        });
      });
    }

    function addDialogEntry() {
      editDialogEntries.push({ condition: '', setFlag: '', clearFlag: '', lines: '', walkToX: '', walkToY: '', teleportPlayerX: '', teleportPlayerY: '', movePlayerX: '', movePlayerY: '' });
      renderDialogList();
    }

    function removeDialogEntry(idx) {
      editDialogEntries.splice(idx, 1);
      renderDialogList();
    }

    function moveDialogEntry(idx, dir) {
      const target = idx + dir;
      if (target < 0 || target >= editDialogEntries.length) return;
      [editDialogEntries[idx], editDialogEntries[target]] = [editDialogEntries[target], editDialogEntries[idx]];
      renderDialogList();
    }

    function saveNpc() {
      if (editingNpcIdx < 0) return;
      const n = npcs[editingNpcIdx];
      n.name = document.getElementById('npName').value.trim() || 'NPC';
      n.type = document.getElementById('npType').value;
      n.sprite = document.getElementById('npSprite').value;
      n.dir = document.getElementById('npDir').value;
      n.showFlag = document.getElementById('npShowFlag').value.trim();
      n.hideFlag = document.getElementById('npHideFlag').value.trim();
      n.walkOnFlag = document.getElementById('npWalkOnFlag').value.trim();
      n.autoTalk = document.getElementById('npAutoTalk').checked;
      n.roam = document.getElementById('npRoam').checked;
      n.roamRadius = parseInt(document.getElementById('npRoamRadius').value) || 3;
      const wtX = document.getElementById('npWalkToX').value;
      const wtY = document.getElementById('npWalkToY').value;
      n.walkTo = (wtX !== '' && wtY !== '') ? { x: parseInt(wtX), y: parseInt(wtY) } : null;

      // Build dialogs array from entries
      n.dialogs = editDialogEntries
        .filter(e => e.lines.trim() !== '')
        .map(e => {
          const d = {
            condition: e.condition.trim(),
            setFlag: e.setFlag.trim(),
            clearFlag: e.clearFlag.trim(),
            lines: e.lines.split('\n').filter(l => l.trim() !== ''),
          };
          if (e.walkToX !== '' && e.walkToY !== '') {
            d.walkTo = { x: parseInt(e.walkToX), y: parseInt(e.walkToY) };
          }
          if (e.teleportPlayerX !== '' && e.teleportPlayerY !== '') {
            d.teleportPlayer = { x: parseInt(e.teleportPlayerX), y: parseInt(e.teleportPlayerY) };
          }
          if (e.movePlayerX !== '' && e.movePlayerY !== '') {
            d.movePlayer = { x: parseInt(e.movePlayerX), y: parseInt(e.movePlayerY) };
          }
          return d;
        });

      // Keep legacy dialog for backward compat (first entry with no condition)
      const defaultEntry = n.dialogs.find(d => !d.condition);
      n.dialog = defaultEntry ? defaultEntry.lines : (n.dialogs[0]?.lines || []);

      const totalLines = n.dialogs.reduce((sum, d) => sum + d.lines.length, 0);
      document.getElementById('info').textContent =
        `NPC "${n.name}" at (${n.x}, ${n.y}) — ${n.dialogs.length} dialog entries, ${totalLines} total lines`;
      closeAllPanels();
    }

    function duplicateNpc() {
      if (editingNpcIdx < 0) return;
      // Save current panel state first
      saveNpc();
      const src = npcs[editingNpcIdx];
      const clone = {
        x: src.x + 1,
        y: src.y,
        name: src.name,
        sprite: src.sprite,
        dir: src.dir,
        type: src.type || 'npc',
        showFlag: src.showFlag || '',
        hideFlag: src.hideFlag || '',
        walkOnFlag: src.walkOnFlag || '',
        walkTo: src.walkTo ? { ...src.walkTo } : null,
        autoTalk: !!src.autoTalk,
        roam: !!src.roam,
        roamRadius: src.roamRadius || 3,
        dialog: [...(src.dialog || [])],
        dialogs: (src.dialogs || []).map(d => ({
          ...d,
          lines: [...(d.lines || [])],
          walkTo: d.walkTo ? { ...d.walkTo } : undefined,
        })),
      };
      npcs.push(clone);
      document.getElementById('info').textContent =
        `Duplicated NPC "${src.name}" to (${clone.x}, ${clone.y})`;
      closeAllPanels();
      openNpcPanel(npcs.length - 1);
    }

    function deleteNpc() {
      if (editingNpcIdx < 0) return;
      const n = npcs[editingNpcIdx];
      npcs.splice(editingNpcIdx, 1);
      document.getElementById('info').textContent = `NPC deleted at (${n.x}, ${n.y})`;
      closeAllPanels();
    }

    // --- Save ---

    async function saveAll() {
      const collLayer = currentMap.layers.find(l => l.name === 'collision');
      collLayer.data = [...collisionData];
      currentMap._warps = warps.map(w => ({ ...w }));
      // Remove _npcs from map data (now stored separately)
      delete currentMap._npcs;

      const npcData = npcs.map(n => ({
        ...n,
        dialog: [...(n.dialog || [])],
        dialogs: (n.dialogs || []).map(d => ({
          ...d,
          lines: [...(d.lines || [])],
          walkTo: d.walkTo ? { ...d.walkTo } : undefined,
        })),
        walkTo: n.walkTo ? { ...n.walkTo } : undefined,
      }));

      try {
        const resp = await fetch('/api/save-map', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mapKey, data: currentMap, npcs: npcData }),
        });
        const result = await resp.json();
        if (result.ok) {
          document.getElementById('info').textContent =
            `Saved ${mapKey}.json (${warps.length} warps, ${npcs.length} NPCs) — live in game now!`;
        } else {
          document.getElementById('info').textContent = `Error: ${result.error}`;
        }
      } catch (err) {
        document.getElementById('info').textContent = `Save failed: ${err.message}`;
      }
    }

    // --- Flag Debug ---

    const FLAG_STORAGE_KEY = 'pokemon-mmo-flags';

    function readFlags() {
      try {
        const raw = localStorage.getItem(FLAG_STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }

    function writeFlags(flags) {
      localStorage.setItem(FLAG_STORAGE_KEY, JSON.stringify(flags));
    }

    function openFlagPanel() {
      renderFlagPanel();
      document.getElementById('flagPanel').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }

    function closeFlagPanel() {
      document.getElementById('flagPanel').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    }

    function renderFlagPanel() {
      const flags = readFlags();
      const keys = Object.keys(flags).sort();
      const container = document.getElementById('flagContent');

      if (keys.length === 0) {
        container.innerHTML = '<div class="flag-empty">No flags set. Play the game and interact with NPCs to set flags.</div>';
        return;
      }

      // Group by prefix (everything before the last underscore-separated segment, or full name)
      const groups = {};
      for (const key of keys) {
        const parts = key.split('_');
        const prefix = parts.length > 1 ? parts.slice(0, -1).join('_') : key;
        if (!groups[prefix]) groups[prefix] = [];
        groups[prefix].push(key);
      }

      let html = '';
      for (const [prefix, flagKeys] of Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]))) {
        html += `<div class="flag-group">`;
        html += `<div class="flag-group-header">`;
        html += `<span>${prefix}  (${flagKeys.length} flag${flagKeys.length > 1 ? 's' : ''})</span>`;
        html += `<button onclick="clearFlagGroup('${prefix}')">Clear Group</button>`;
        html += `</div>`;
        for (const key of flagKeys) {
          html += `<div class="flag-item">`;
          html += `<span>${key}</span>`;
          html += `<button onclick="clearSingleFlag('${key}')">Clear</button>`;
          html += `</div>`;
        }
        html += `</div>`;
      }

      container.innerHTML = html;
    }

    function clearSingleFlag(name) {
      const flags = readFlags();
      delete flags[name];
      writeFlags(flags);
      renderFlagPanel();
      document.getElementById('info').textContent = `Cleared flag: ${name}`;
    }

    function clearFlagGroup(prefix) {
      const flags = readFlags();
      const toDelete = Object.keys(flags).filter(k => {
        const parts = k.split('_');
        const p = parts.length > 1 ? parts.slice(0, -1).join('_') : k;
        return p === prefix;
      });
      for (const k of toDelete) delete flags[k];
      writeFlags(flags);
      renderFlagPanel();
      document.getElementById('info').textContent = `Cleared ${toDelete.length} flag(s) in group: ${prefix}`;
    }

    function clearAllFlags() {
      if (!confirm('Clear ALL game flags? This resets all quest progress.')) return;
      localStorage.removeItem(FLAG_STORAGE_KEY);
      renderFlagPanel();
      document.getElementById('info').textContent = 'All flags cleared!';
    }

    function addFlag() {
      const input = document.getElementById('flagAddInput');
      const name = input.value.trim();
      if (!name) return;
      const flags = readFlags();
      flags[name] = true;
      writeFlags(flags);
      input.value = '';
      renderFlagPanel();
      document.getElementById('info').textContent = `Set flag: ${name}`;
    }

    document.getElementById('flagAddInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addFlag();
    });

    loadMap();
  </script>
</body>
</html>
