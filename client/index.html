<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pokemon MMO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      touch-action: none;
    }
    canvas { image-rendering: pixelated; }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
    }
    .hud-text {
      font-size: 13px;
      color: #fff;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1.4;
    }
    #hud-left {
      background: rgba(0,0,0,0.75);
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 6px;
      padding: 6px 10px;
      min-width: 140px;
      line-height: 1.5;
    }
    #hud-left .trainer-name { color: #ffd700; font-weight: bold; font-size: 14px; }
    #hud-left .trainer-lv { color: #88ff88; font-size: 12px; margin-left: 4px; }
    #hud-left .money { color: #fff; font-size: 12px; }
    #hud-left .money-symbol { color: #ffd700; font-weight: bold; }
    #hud-left .map-name { color: #aac8ff; font-size: 11px; }
    #hud-left .coords { color: rgba(255,255,255,0.6); font-size: 11px; }
    #hud-left .badges-row { font-size: 11px; color: rgba(255,255,255,0.5); }
    #hud-left .badge-count { color: #ffd700; font-weight: bold; }
    #hud-left .hud-icons {
      display: flex; gap: 4px; margin-top: 4px;
      pointer-events: auto;
    }
    #hud-left .hud-icon-btn {
      width: 26px; height: 26px;
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }
    #hud-left .hud-icon-btn:hover {
      background: rgba(255,215,0,0.25);
      border-color: #ffd700;
    }
    #hud-right { text-align: right; }
    #hud-right .status-online { color: #88ff88; }
    #hud-right .status-offline { color: #ff6666; }
    #hud-right .players { color: #88ccff; }

    /* Dialog box */
    #dialog-box {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(94vw, 720px);
      background: rgba(0, 0, 0, 0.92);
      border: 3px solid #fff;
      border-radius: 10px;
      padding: 18px 24px 14px;
      z-index: 30;
      pointer-events: auto;
    }
    #dialog-name {
      font-size: 16px;
      color: #ffd700;
      margin-bottom: 6px;
      font-weight: bold;
    }
    #dialog-text {
      font-size: 20px;
      color: #fff;
      line-height: 1.6;
      min-height: 2em;
    }
    #dialog-prompt {
      font-size: 13px;
      color: #aaa;
      text-align: right;
      margin-top: 8px;
    }
    @media (max-width: 480px) {
      #dialog-box {
        bottom: 80px;
        padding: 14px 16px 10px;
      }
      #dialog-text { font-size: 16px; }
      #dialog-name { font-size: 14px; }
    }

    /* Name labels (HTML overlay for crisp text) */
    #name-labels {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
      width: 100%; height: 100%;
    }
    .name-label {
      position: absolute;
      font-size: 11px;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      background: rgba(0,0,0,0.6);
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
      transform: translate(-50%, -100%);
      line-height: 1.3;
    }

    /* Mobile D-Pad */
    #dpad {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 20;
      width: 140px;
      height: 140px;
    }
    .dpad-btn {
      position: absolute;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .dpad-btn:active, .dpad-btn.active {
      background: rgba(255,255,255,0.5);
    }
    #dpad-up    { top: 0;   left: 48px; }
    #dpad-down  { bottom: 0; left: 48px; }
    #dpad-left  { top: 48px; left: 0; }
    #dpad-right { top: 48px; right: 0; }

    /* Action button (interact) */
    #btn-action {
      display: none;
      position: fixed;
      bottom: 40px;
      right: 24px;
      z-index: 20;
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #btn-action:active, #btn-action.active {
      background: rgba(255,255,255,0.5);
    }

    /* Inventory panels */
    .inv-panel {
      position: fixed;
      z-index: 15;
      pointer-events: auto;
      user-select: none;
    }
    .drag-handle {
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px 3px 0 0;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drag-handle::after {
      content: '';
      width: 24px;
      height: 2px;
      background: rgba(255,255,255,0.4);
      border-radius: 1px;
    }
    .drag-handle:active { cursor: grabbing; }

    .inv-slots {
      display: flex;
      gap: 2px;
      padding: 3px;
      background: rgba(0,0,0,0.5);
      border-radius: 0 0 3px 3px;
    }
    .inv-slot {
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      image-rendering: pixelated;
    }
    .inv-slot:hover {
      border-color: rgba(255,215,0,0.7);
      background: rgba(255,255,255,0.1);
    }
    .inv-slot.drag-over {
      border-color: #ffd700;
      background: rgba(255,215,0,0.15);
    }
    .inv-slot img {
      max-width: 32px;
      max-height: 32px;
      image-rendering: pixelated;
      pointer-events: none;
    }
    /* Party panel overrides the base 32px limit */
    #party-panel .inv-slot img {
      max-width: 68px !important;
      max-height: 68px !important;
      width: 68px !important;
      height: 68px !important;
    }
    .inv-slot .slot-count {
      position: absolute;
      bottom: 1px;
      right: 2px;
      font-size: 9px;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
      line-height: 1;
    }

    #hotbar {
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    #party-panel {
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
    }
    #party-panel .inv-slots {
      flex-direction: column;
    }
    #party-panel .inv-slot {
      width: 72px;
      height: 96px;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 2px 2px 3px;
      gap: 1px;
      position: relative;
    }

    #party-panel .slot-level {
      font-size: 8px;
      color: #ffd700;
      font-family: monospace;
      text-shadow: 1px 1px 0 #000;
      line-height: 1;
      align-self: flex-start;
      padding-left: 1px;
    }
    #party-panel .slot-hp-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: auto;
    }
    #party-panel .slot-hp-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    /* HP bar colour based on percentage */
    .hp-high   { background: #2ecc71; }
    .hp-medium { background: #f39c12; }
    .hp-low    { background: #e74c3c; }

    #bag-btn {
      position: fixed;
      z-index: 15;
      bottom: 58px;
      left: calc(50% - 230px);
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      line-height: 1;
    }
    #bag-btn:hover {
      border-color: rgba(255,215,0,0.7);
      background: rgba(255,255,255,0.1);
    }

    #bag-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 25;
      pointer-events: auto;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #bag-overlay.open { display: flex; }
    #bag-overlay .bag-title {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 12px;
    }
    #bag-overlay .bag-grid {
      display: grid;
      grid-template-columns: repeat(6, 36px);
      gap: 3px;
    }
    #bag-overlay .bag-close {
      margin-top: 14px;
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 4px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #bag-overlay .bag-close:hover {
      border-color: #ffd700;
      color: #ffd700;
    }

    /* Show dpad + action on touch devices */
    @media (pointer: coarse) {
      #dpad { display: block; }
      #btn-action { display: flex; align-items: center; justify-content: center; }
    }

    /* Landscape on mobile — shrink controls */
    @media (pointer: coarse) and (orientation: landscape) {
      #dpad {
        bottom: 8px;
        left: 12px;
        width: 110px;
        height: 110px;
      }
      .dpad-btn {
        width: 34px;
        height: 34px;
        font-size: 16px;
      }
      #dpad-up    { top: 0;   left: 38px; }
      #dpad-down  { bottom: 0; left: 38px; }
      #dpad-left  { top: 38px; left: 0; }
      #dpad-right { top: 38px; right: 0; }
      #btn-action {
        bottom: 24px;
        right: 12px;
        width: 46px;
        height: 46px;
        font-size: 12px;
      }
      #dialog-box {
        bottom: 8px;
        padding: 10px 14px 8px;
      }
      #dialog-text { font-size: 14px; min-height: 1.2em; }
      #dialog-name { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-left">
      <span class="trainer-name"></span><span class="trainer-lv">Lv.1</span><br>
      <span class="money"><span class="money-symbol">P</span><span class="money-val">0</span></span><br>
      <span class="badges-row">Badges: <span class="badge-count">0</span></span><br>
      <span class="map-name"></span> <span class="coords"></span>
      <div class="hud-icons">
        <button class="hud-icon-btn" id="hud-btn-party" title="Party (P)">&#x1F43E;</button>
        <button class="hud-icon-btn" id="hud-btn-bag" title="Bag (B)">&#x1F392;</button>
        <button class="hud-icon-btn" id="hud-btn-badges" title="Badges">&#x1F3C5;</button>
        <button class="hud-icon-btn" id="hud-btn-quests" title="Quest Log">&#x1F4DC;</button>
      </div>
    </div>
    <div id="hud-right" class="hud-text">
      <span class="status"></span><br>
      <span class="players"></span>
    </div>
  </div>

  <div id="name-labels"></div>

  <div id="dialog-box">
    <div id="dialog-name"></div>
    <div id="dialog-text"></div>
    <div id="dialog-prompt"></div>
  </div>

  <div id="hotbar" class="inv-panel">
    <div class="drag-handle"></div>
    <div class="inv-slots">
      <div class="inv-slot" data-panel="hotbar" data-index="0"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="1"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="2"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="3"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="4"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="5"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="6"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="7"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="8"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="9"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="10"></div>
      <div class="inv-slot" data-panel="hotbar" data-index="11"></div>
    </div>
  </div>

  <div id="party-panel" class="inv-panel">
    <div class="drag-handle"></div>
    <div class="inv-slots">
      <div class="inv-slot" data-panel="party" data-index="0"></div>
      <div class="inv-slot" data-panel="party" data-index="1"></div>
      <div class="inv-slot" data-panel="party" data-index="2"></div>
      <div class="inv-slot" data-panel="party" data-index="3"></div>
      <div class="inv-slot" data-panel="party" data-index="4"></div>
      <div class="inv-slot" data-panel="party" data-index="5"></div>
    </div>
  </div>

  <button id="bag-btn">B</button>

  <div id="bag-overlay">
    <div class="bag-title">BAG</div>
    <div class="bag-grid"></div>
    <button class="bag-close">Close (B / Esc)</button>
  </div>

  <button id="btn-action">A</button>

  <div id="dpad">
    <div id="dpad-up" class="dpad-btn" data-dir="up">▲</div>
    <div id="dpad-down" class="dpad-btn" data-dir="down">▼</div>
    <div id="dpad-left" class="dpad-btn" data-dir="left">◀</div>
    <div id="dpad-right" class="dpad-btn" data-dir="right">▶</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
